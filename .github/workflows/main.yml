name: Java CI with Maven

on:
  push:
    branches: [ "main" ] # Sadece main branch'ine atınca çalışır

jobs:
  build:
    runs-on: ubuntu-latest # Linux üzerinde çalıştır

    steps:
    - uses: actions/checkout@v3 # Kodunu GitHub'dan çek
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml # Kodda hata var mı bak ve derle
